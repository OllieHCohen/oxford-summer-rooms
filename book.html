<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Book a room — Oxford Summer Rooms</title>
  <link href="https://fonts.googleapis.com/css?family=Quicksand:400,500,600,700" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css" />
  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="mask-icon" href="safari-pinned-tab.svg" color="#1f3a66" />
  <meta name="msapplication-TileColor" content="#1f3a66" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="page-top"><a class="backlink" id="backlink" href="index.html">← Back to rooms</a></div>

  <main class="book">
    <div id="status" class="status">Loading booking…</div>
    <div id="content"></div>
  </main>

  <script src="common.js"></script>
  <script>
    const val = (id) => (document.getElementById(id)?.value || '').trim();
    const setErr = (wrapId, on) => { const el = document.getElementById(wrapId); if (el) el.classList.toggle('invalid', !!on); return !!on; };
    let phoneIti = null;

    async function load() {
      const propertyId = parseInt(param('property'), 10);
      const roomId = parseInt(param('room'), 10);
      if (propertyId) document.getElementById('backlink').href = `property.html?id=${propertyId}`;
      // Came straight from a room ("Book this room") → load it directly, no picker.
      if (propertyId && roomId) { loadRoom(propertyId, roomId); return; }
      // No specific room (e.g. the homepage "Reserve a room" button) → show a room picker.
      loadPicker();
    }

    async function loadRoom(propertyId, roomId, target) {
      target = target || document.getElementById('content');
      const statusEl = document.getElementById('status');
      try {
        const { liveIds, heroById } = await fetchLive();
        const [memberRows, bRows] = await Promise.all([
          sb(`summer_void_members?void_property_id=eq.${propertyId}&property_id=eq.${roomId}&select=property_id,room_location,void_property_id`),
          sb(`summer_void_properties?property_id=eq.${propertyId}&select=property_id,property_address,city`)
        ]);
        const member = memberRows[0], building = bRows[0];
        if (!member || !building || !liveIds.has(roomId)) {
          target.innerHTML = '<div class="notice notice-amber">This room isn’t available to book right now. <a href="index.html">See all properties →</a></div>'; statusEl.style.display = 'none'; return;
        }
        const [detailRows, availability] = await Promise.all([
          sb(`bannits_property_cache?property_id=eq.${roomId}&select=property_id,property_name,rent_per_month,number_of_beds,number_of_bathrooms,images`),
          sb(`room_availability?property_id=eq.${roomId}&select=property_id,window_start,window_end`)
        ]);
        const detail = detailRows[0] || {};
        const windows = bookableWindows(availability);
        renderBooking({ propertyId, roomId, member, building, detail, windows, hero: heroById.get(roomId), target });
        statusEl.style.display = 'none';
      } catch (err) {
        target.innerHTML = '<div class="notice notice-amber">Sorry — we couldn’t load this room right now.</div>';
        document.getElementById('status').style.display = 'none';
        console.error(err);
      }
    }

    let PICKER_ROOMS = [];
    async function loadPicker() {
      const statusEl = document.getElementById('status');
      document.getElementById('backlink').textContent = '← All properties';
      const noRooms = () => { statusEl.innerHTML = 'No rooms are available to book right now. <a href="index.html">See all properties →</a>'; };
      try {
        const { liveIds } = await fetchLive();
        if (!liveIds.size) return noRooms();
        const [buildings, members] = await Promise.all([
          sb('summer_void_properties?select=property_id,property_address'),
          sb('summer_void_members?select=void_property_id,property_id,room_location')
        ]);
        const addrByBuilding = new Map(buildings.map(b => [b.property_id, b.property_address || 'Property']));
        const liveMembers = members.filter(m => liveIds.has(m.property_id));
        if (!liveMembers.length) return noRooms();
        const roomIds = [...new Set(liveMembers.map(m => m.property_id))];
        const detail = await sb(`bannits_property_cache?property_id=in.${inList(roomIds)}&select=property_id,property_name,rent_per_month`);
        const detById = new Map(detail.map(d => [d.property_id, d]));
        PICKER_ROOMS = liveMembers.map(m => {
          const d = detById.get(m.property_id) || {};
          return {
            buildingId: m.void_property_id, roomId: m.property_id,
            address: addrByBuilding.get(m.void_property_id) || 'Property',
            name: m.room_location || d.property_name || `Room #${m.property_id}`,
            week: d.rent_per_month ? weeklyRent(d.rent_per_month) : null
          };
        }).sort((a, b) => a.address.localeCompare(b.address) || (a.week || 0) - (b.week || 0));
        statusEl.style.display = 'none';
        renderPicker();
      } catch (err) { statusEl.textContent = 'Sorry — we couldn’t load available rooms right now.'; console.error(err); }
    }

    function renderPicker() {
      const opts = PICKER_ROOMS.map((r, i) =>
        `<option value="${i}">${esc(r.address)} — ${esc(r.name)}${r.week ? ` · ${fmtGBP(r.week)}/week` : ''}</option>`).join('');
      document.getElementById('content').innerHTML = `
        <div class="picker-card">
          <h3>Reserve your room</h3>
          <p class="picker-sub">Choose the room you’d like to reserve, then fill in your details below to pay the £100 holding deposit.</p>
          <div class="field"><label for="roomPick">Room <span class="req">*</span></label>
            <select id="roomPick"><option value="">Select a room…</option>${opts}</select></div>
        </div>
        <div id="pickerBooking"></div>`;
      document.getElementById('roomPick').addEventListener('change', (e) => {
        const r = PICKER_ROOMS[parseInt(e.target.value, 10)];
        const host = document.getElementById('pickerBooking');
        if (phoneIti) { try { phoneIti.destroy(); } catch (_) {} phoneIti = null; }
        if (!r) { host.innerHTML = ''; return; }
        document.getElementById('backlink').href = `property.html?id=${r.buildingId}`;
        host.innerHTML = '<div class="status">Loading room…</div>';
        loadRoom(r.buildingId, r.roomId, host);
      });
    }

    function renderBooking(ctx) {
      const { propertyId, roomId, member, building, detail, windows, hero } = ctx;
      const target = ctx.target || document.getElementById('content');
      const name = member.room_location || detail.property_name || 'Room';
      const cls = classifyImages(detail.images);
      const photos = applyHero(cls.photos, hero);
      const thumb = photos[0] ? photos[0].url : '';
      const week = detail.rent_per_month ? weeklyRent(detail.rent_per_month) : null;
      const addr = building.property_address || '';
      const noAvail = !windows.length;
      const windowOptions = windows.map((w, i) =>
        `<option value="${i}">${fmtDate(w.window_start)} – ${fmtDate(w.window_end)} (up to ${nightsBetween(w.window_start, w.window_end)} nights)</option>`).join('');
      const availHtml = windows.length ? `<div class="avail-note">📅 <strong>Available to book:</strong><br>${windows.map(w =>
        `${fmtDate(w.window_start)} &ndash; ${fmtDate(w.window_end)} <span class="an-nights">(up to ${nightsBetween(w.window_start, w.window_end)} nights)</span>`).join('<br>')}
        <div class="an-min">Minimum stay 2 weeks. Pick a check-in and check-out within ${windows.length > 1 ? 'one of these periods' : 'this period'}.</div></div>` : '';

      target.innerHTML = `
        <div class="summary-card">
          ${thumb ? `<img src="${esc(thumb)}" alt="${esc(name)}">` : ''}
          <div>
            <div class="sc-title">${esc(name)}</div>
            <div class="sc-addr">${esc(addr)}</div>
            <div class="sc-ids">Property #${propertyId} · Room #${roomId}</div>
            ${week ? `<div class="sc-price">${fmtGBP(week)} <span style="font-weight:500;color:var(--muted);font-size:13px">/ week</span></div>` : ''}
          </div>
        </div>
        ${noAvail ? `<div class="notice notice-amber">This room has no available dates of 2+ weeks right now. Please <a href="property.html?id=${propertyId}">choose another room</a>.</div>` : `
        <form class="form-card" id="bookForm" novalidate>
          <div class="form-section">
            <h3>Your stay</h3>
            ${availHtml}
            ${windows.length > 1 ? `<div class="field"><label for="window">Available period <span class="req">*</span></label><select id="window">${windowOptions}</select></div>` : ''}
            <div class="field-row">
              <div class="field" id="f-checkin"><label for="checkin">Check-in <span class="req">*</span></label><input type="date" id="checkin"><div class="field-error">Pick a check-in date inside the available period.</div></div>
              <div class="field" id="f-checkout"><label for="checkout">Check-out <span class="req">*</span></label><input type="date" id="checkout"><div class="field-error">Stay must be at least 14 nights and within the period.</div></div>
            </div>
            <div id="priceSummary"></div>
          </div>
          <div class="form-section">
            <h3>Your details</h3>
            <div class="field-row">
              <div class="field" id="f-first"><label for="firstName">First name <span class="req">*</span></label><input id="firstName" autocomplete="given-name"><div class="field-error">Please enter your first name.</div></div>
              <div class="field" id="f-last"><label for="lastName">Last name <span class="req">*</span></label><input id="lastName" autocomplete="family-name"><div class="field-error">Please enter your last name.</div></div>
            </div>
            <div class="field-row">
              <div class="field" id="f-email"><label for="email">Email <span class="req">*</span></label><input type="email" id="email" autocomplete="email"><div class="field-error">Please enter a valid email address.</div></div>
              <div class="field" id="f-mobile"><label for="mobile">Mobile <span class="req">*</span></label><input type="tel" id="mobile" autocomplete="tel"><div class="field-hint">Just type your number as normal — the country code is already set.</div><div class="field-error">Please enter a valid mobile number.</div></div>
            </div>
          </div>
          <div class="form-section">
            <h3>Billing address</h3>
            <div class="field" id="f-pcsearch">
              <label for="pcsearch">Find your address</label>
              <div class="pc-row">
                <select id="pccountry" class="pc-country" aria-label="Country to search"></select>
                <input id="pcsearch" placeholder="Enter your postcode, e.g. OX4 1QJ" autocomplete="off">
                <button type="button" class="btn btn-ghost" id="pcfind">Find address</button>
              </div>
              <select id="pcresults" class="pc-results" style="display:none"></select>
              <div class="pc-msg" id="pcmsg"></div>
            </div>
            <div class="field" id="f-addr1"><label for="addr1">Address line 1 <span class="req">*</span></label><input id="addr1" autocomplete="address-line1"><div class="field-error">Please enter your address.</div></div>
            <div class="field"><label for="addr2">Address line 2</label><input id="addr2" autocomplete="address-line2"></div>
            <div class="field-row">
              <div class="field" id="f-city"><label for="city">City / Town <span class="req">*</span></label><input id="city" autocomplete="address-level2"><div class="field-error">Please enter your city or town.</div></div>
              <div class="field" id="f-postcode"><label for="postcode">Postcode <span class="req">*</span></label><input id="postcode" autocomplete="postal-code"><div class="field-error">Please enter your postcode.</div></div>
            </div>
            <div class="field" id="f-country"><label for="country">Country <span class="req">*</span></label><input id="country" autocomplete="country-name" value="United Kingdom"><div class="field-error">Please enter your country.</div></div>
          </div>
          <div class="pay-box">
            <div class="price-due">
              <div class="pd-label">Due today to reserve<small>£100 — goes towards your rent · non-refundable, so please be sure</small></div>
              <div class="pd-amt">£100</div>
            </div>
            ${PAYMENTS_ENABLED
              ? `<div class="notice notice-info" style="margin-top:14px">🔒 Secure card payment by <strong>Stripe</strong>. You’ll be redirected to Stripe to pay the £100 non-refundable holding deposit and confirm your reservation.</div>`
              : `<div class="notice notice-info" style="margin-top:14px">🔒 Secure card payment by <strong>Stripe</strong>. Card payment isn’t switched on yet — clicking below validates and prepares your booking, ready for the Stripe step to go live.</div>`}
            <div id="formError" class="notice notice-amber" style="display:none;margin-top:14px"></div>
            <button type="submit" class="btn btn-green btn-lg btn-block" style="margin-top:16px">Pay £100 &amp; reserve room</button>
            <div class="hint">The £100 goes towards your rent and is non-refundable, so please only book if you’re sure you want the room. Bills (gas, electricity &amp; water) are included. Minimum stay 2 weeks.</div>
          </div>
        </form>`}`;

      if (!noAvail) setupBookingForm(ctx);
    }

    function setupBookingForm(ctx) {
      const { windows, detail, propertyId, roomId, member, building } = ctx;
      const week = detail.rent_per_month ? weeklyRent(detail.rent_per_month) : 0;
      const sel = document.getElementById('window');
      const checkin = document.getElementById('checkin');
      const checkout = document.getElementById('checkout');
      const summaryEl = document.getElementById('priceSummary');
      const currentWindow = () => windows[sel ? parseInt(sel.value, 10) : 0];

      function applyWindowBounds() {
        const w = currentWindow();
        checkin.min = w.window_start; checkin.max = addDays(w.window_end, -MIN_NIGHTS);
        checkout.min = addDays(w.window_start, MIN_NIGHTS); checkout.max = w.window_end;
        if (checkin.value && (checkin.value < checkin.min || checkin.value > checkin.max)) checkin.value = '';
        if (checkout.value && (checkout.value < checkout.min || checkout.value > checkout.max)) checkout.value = '';
        onCheckinChange();
      }
      function onCheckinChange() {
        if (checkin.value) {
          checkout.min = addDays(checkin.value, MIN_NIGHTS); checkout.max = currentWindow().window_end;
          if (checkout.value && checkout.value < checkout.min) checkout.value = '';
        }
        renderSummary();
      }
      function renderSummary() {
        if (!checkin.value || !checkout.value) { summaryEl.innerHTML = ''; return; }
        const nights = nightsBetween(checkin.value, checkout.value);
        if (nights < MIN_NIGHTS) { summaryEl.innerHTML = `<div class="notice notice-amber" style="margin-top:8px">Minimum stay is 14 nights.</div>`; return; }
        const weeks = nights / 7;
        const stay = week * weeks;
        const total = stay + CLEANING_FEE;
        const weeksLabel = Number.isInteger(weeks) ? `${weeks} week${weeks === 1 ? '' : 's'}` : `${weeks.toFixed(1)} weeks`;
        summaryEl.innerHTML = `
          <div class="price-summary">
            <div class="ps-row"><span>${fmtGBP(week)}/week × ${nights} nights (${weeksLabel})</span><span>${fmtGBP(stay)}</span></div>
            ${CLEANING_FEE ? `<div class="ps-row"><span>One-off cleaning</span><span>${fmtGBP(CLEANING_FEE)}</span></div>` : ''}
            <div class="ps-row ps-total"><span>Estimated stay total</span><span>${fmtGBP(total)}</span></div>
            <div class="ps-row ps-muted"><span>Bills included · paid after you move in</span><span></span></div>
          </div>`;
      }

      if (sel) sel.addEventListener('change', applyWindowBounds);
      checkin.addEventListener('change', onCheckinChange);
      checkout.addEventListener('change', renderSummary);
      applyWindowBounds();

      // --- Postcoder address lookup (UK + international) ---
      const COUNTRIES = [
        ['UK', 'United Kingdom'], ['IE', 'Ireland'], ['US', 'United States'], ['CA', 'Canada'],
        ['AU', 'Australia'], ['NZ', 'New Zealand'], ['FR', 'France'], ['DE', 'Germany'], ['ES', 'Spain'],
        ['IT', 'Italy'], ['NL', 'Netherlands'], ['BE', 'Belgium'], ['PT', 'Portugal'], ['CH', 'Switzerland'],
        ['AT', 'Austria'], ['SE', 'Sweden'], ['NO', 'Norway'], ['DK', 'Denmark'], ['FI', 'Finland'],
        ['PL', 'Poland'], ['GR', 'Greece'], ['IN', 'India'], ['CN', 'China'], ['HK', 'Hong Kong'],
        ['SG', 'Singapore'], ['JP', 'Japan'], ['KR', 'South Korea'], ['AE', 'United Arab Emirates'],
        ['SA', 'Saudi Arabia'], ['NG', 'Nigeria'], ['GH', 'Ghana'], ['KE', 'Kenya'], ['ZA', 'South Africa'],
        ['PK', 'Pakistan'], ['BD', 'Bangladesh'], ['BR', 'Brazil'], ['MX', 'Mexico'],
        ['', 'Other (enter manually)'],
      ];
      const pccountry = document.getElementById('pccountry');
      const pcsearch = document.getElementById('pcsearch');
      const pcfind = document.getElementById('pcfind');
      const pcresults = document.getElementById('pcresults');
      const pcmsg = document.getElementById('pcmsg');
      let pcData = [];
      pccountry.innerHTML = COUNTRIES.map(([c, n]) => `<option value="${c}">${esc(n)}</option>`).join('');
      const countryName = () => (COUNTRIES.find(c => c[0] === pccountry.value) || [, 'United Kingdom'])[1];

      function onCountryChange() {
        const other = pccountry.value === '';
        pcsearch.style.display = other ? 'none' : '';
        pcfind.style.display = other ? 'none' : '';
        pcresults.style.display = 'none'; pcresults.innerHTML = '';
        pcsearch.placeholder = pccountry.value === 'UK' ? 'Enter your postcode, e.g. OX4 1QJ' : 'Enter postcode / ZIP or street';
        pcmsg.textContent = other ? 'Please enter your address in the fields below.' : '';
        if (other) document.getElementById('country').value = '';
      }
      pccountry.addEventListener('change', onCountryChange);

      async function doLookup() {
        const q = (pcsearch.value || '').trim();
        pcmsg.textContent = ''; pcresults.style.display = 'none'; pcresults.innerHTML = '';
        if (q.length < 2) { pcmsg.textContent = 'Enter a postcode or address to search.'; return; }
        const orig = pcfind.textContent; pcfind.disabled = true; pcfind.textContent = 'Searching…';
        try {
          const res = await fetch(`${ADDRESS_FN}?q=${encodeURIComponent(q)}&country=${encodeURIComponent(pccountry.value || 'UK')}`, { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } });
          const data = await res.json().catch(() => ({}));
          pcData = data.results || [];
          if (!pcData.length) { pcmsg.textContent = 'No addresses found — please enter your address below.'; return; }
          pcresults.innerHTML = `<option value="">${pcData.length} address${pcData.length === 1 ? '' : 'es'} found — select yours…</option>`
            + pcData.map((a, i) => `<option value="${i}">${esc(a.summary)}</option>`).join('');
          pcresults.style.display = 'block';
        } catch (err) { pcmsg.textContent = 'Address lookup is unavailable — please enter your address below.'; console.error(err); }
        finally { pcfind.disabled = false; pcfind.textContent = orig; }
      }
      pcfind.addEventListener('click', doLookup);
      pcsearch.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doLookup(); } });
      pcresults.addEventListener('change', () => {
        const a = pcData[parseInt(pcresults.value, 10)];
        if (!a) return;
        document.getElementById('addr1').value = a.line1 || '';
        document.getElementById('addr2').value = a.line2 || '';
        document.getElementById('city').value = a.city || '';
        document.getElementById('postcode').value = a.postcode || '';
        document.getElementById('country').value = countryName();
        ['f-addr1', 'f-city', 'f-postcode'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('invalid'); });
        pcmsg.textContent = 'Address filled in — please check it and edit if needed.';
      });

      // --- International phone validation (intl-tel-input / libphonenumber) ---
      const mobileEl = document.getElementById('mobile');
      if (window.intlTelInput && mobileEl && !phoneIti) {
        phoneIti = window.intlTelInput(mobileEl, {
          initialCountry: 'gb', preferredCountries: ['gb', 'ie', 'us'], separateDialCode: true,
          utilsScript: 'https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js'
        });
      }

      document.getElementById('bookForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('formError');
        if (errEl) errEl.style.display = 'none';
        if (!validate(ctx)) return;
        const nights = nightsBetween(checkin.value, checkout.value);
        const payload = {
          property_id: propertyId, building_id: propertyId, room_id: roomId,
          room_location: member.room_location, property_address: building.property_address,
          check_in: checkin.value, check_out: checkout.value, nights,
          weekly_rent: Math.round(week), cleaning_fee: CLEANING_FEE,
          estimated_stay_total: Math.round(week * nights / 7 + CLEANING_FEE),
          holding_deposit: HOLDING_DEPOSIT,
          guest: {
            first_name: val('firstName'), last_name: val('lastName'), email: val('email'),
            mobile: (phoneIti && window.intlTelInputUtils && phoneIti.getNumber()) ? phoneIti.getNumber() : val('mobile'),
            address: { line1: val('addr1'), line2: val('addr2'), city: val('city'), postcode: val('postcode'), country: val('country') }
          }
        };

        // Until the edge function + Stripe are live, validate and confirm (no charge).
        if (!PAYMENTS_ENABLED) { console.log('Booking payload (stub — Stripe/save not live yet):', payload); showConfirmation(payload); return; }

        // Live: create the £100 Stripe Checkout session via the edge function, then redirect to pay.
        const btn = document.querySelector('#bookForm button[type="submit"]');
        const orig = btn.textContent; btn.disabled = true; btn.textContent = 'Processing…';
        try {
          const res = await fetch(BOOKING_FN, {
            method: 'POST',
            headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.url) { window.location.href = data.url; return; }
          showFormError(data.error || 'Sorry, we couldn’t start the payment. Please try again.');
        } catch (err) {
          showFormError('Network error — please try again.'); console.error(err);
        } finally {
          btn.disabled = false; btn.textContent = orig;
        }
      });
    }

    function validate(ctx) {
      let ok = true;
      const checkin = document.getElementById('checkin');
      const checkout = document.getElementById('checkout');
      const sel = document.getElementById('window');
      const w = ctx.windows[sel ? parseInt(sel.value, 10) : 0];
      const ciBad = !checkin.value || checkin.value < w.window_start || checkin.value > addDays(w.window_end, -MIN_NIGHTS);
      const coBad = !checkout.value || checkout.value > w.window_end || !checkin.value || nightsBetween(checkin.value, checkout.value) < MIN_NIGHTS;
      if (setErr('f-checkin', ciBad)) ok = false;
      if (setErr('f-checkout', coBad)) ok = false;

      const checks = [['firstName', 'f-first'], ['lastName', 'f-last'],
        ['addr1', 'f-addr1'], ['city', 'f-city'], ['postcode', 'f-postcode'], ['country', 'f-country']];
      for (const [inp, wrap] of checks) { if (setErr(wrap, !val(inp))) ok = false; }
      if (setErr('f-email', !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val('email')))) ok = false;
      // mobile: validate international format when libphonenumber utils are loaded, else require non-empty
      const utilsReady = !!window.intlTelInputUtils;
      const mobileBad = (phoneIti && utilsReady) ? !phoneIti.isValidNumber() : !val('mobile');
      if (setErr('f-mobile', mobileBad)) ok = false;
      return ok;
    }

    function showFormError(msg) {
      const el = document.getElementById('formError');
      if (el) { el.textContent = msg; el.style.display = 'block'; el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    }

    function showConfirmation(p) {
      document.getElementById('content').innerHTML = `
        <div class="confirm">
          <h3>✓ Booking details captured</h3>
          <p>Thanks ${esc(p.guest.first_name)} — we’ve got your request for <strong>${esc(p.room_location || 'this room')}</strong> at ${esc(p.property_address || '')}, from <strong>${fmtDate(p.check_in)}</strong> to <strong>${fmtDate(p.check_out)}</strong> (${p.nights} nights).</p>
