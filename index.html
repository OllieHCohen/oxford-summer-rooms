<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />

  <title>Oxford Summer Rooms</title>

  <link href="https://fonts.googleapis.com/css?family=Quicksand:400,500,600,700" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="mask-icon" href="safari-pinned-tab.svg" color="#1f3a66" />
  <meta name="msapplication-TileColor" content="#1f3a66" />
  <meta name="theme-color" content="#ffffff" />

  <style>
    :root {
      --navy: #1f3a66;
      --gold: #e0a93b;
      --green: #22c55e;
      --bg: #f2f3f6;
      --card: #ffffff;
      --line: #e6e8ee;
      --ink: #1d2330;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      font-family: 'Quicksand', Arial, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; }

    /* ---- Hero ---- */
    .hero { text-align: center; padding: clamp(40px, 7vw, 64px) 20px 36px; }

    .hero .logo {
      width: clamp(260px, 55vw, 420px);
      height: auto;
      margin: 0 auto;
      display: block;
    }

    /* ---- Listings ---- */
    .listings { max-width: 1100px; margin: 0 auto; padding: 12px clamp(14px, 4vw, 20px) 80px; }

    .listings-head {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
      border-bottom: 1px solid var(--line); padding-bottom: 14px; margin-bottom: 28px;
    }
    .listings-head h2 { font-size: clamp(18px, 4vw, 20px); font-weight: 600; color: var(--navy); margin: 0; letter-spacing: 0.5px; }
    .as-of { font-size: 12px; color: var(--muted); }
    .status { text-align: center; color: var(--muted); padding: 48px 0; font-size: 15px; }

    /* ---- Building ---- */
    .building {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 16px; overflow: hidden; margin-bottom: 40px;
      box-shadow: 0 1px 2px rgba(20, 30, 60, 0.04);
    }

    /* Carousel */
    .carousel { position: relative; background: #dfe3ec; }
    .carousel-track {
      display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .carousel-track::-webkit-scrollbar { display: none; }
    .carousel-slide {
      flex: 0 0 100%; width: 100%;
      height: clamp(210px, 40vw, 320px);
      object-fit: cover; scroll-snap-align: center; cursor: zoom-in;
    }
    .car-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.9); color: var(--navy);
      font-size: 22px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .car-btn:hover { background: #fff; }
    .car-prev { left: 12px; } .car-next { right: 12px; }
    .car-count {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.6); color: #fff; font-size: 12px;
      padding: 4px 9px; border-radius: 999px; pointer-events: none;
    }
    .car-extras { position: absolute; left: 12px; bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.94); color: var(--navy);
      font-size: 12.5px; font-weight: 600; padding: 7px 11px;
      border-radius: 999px; border: none; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .chip:hover { background: #fff; }
    .chip svg { width: 14px; height: 14px; }

    .gap-badge {
      position: absolute; left: 12px; top: 12px;
      background: rgba(31, 58, 102, 0.92); color: #fff;
      font-size: 12.5px; font-weight: 500; padding: 7px 12px;
      border-radius: 999px; letter-spacing: 0.3px;
    }

    .building-body { padding: clamp(16px, 4vw, 24px); }
    .building-body h3 { margin: 0; font-size: clamp(18px, 4.5vw, 21px); font-weight: 700; color: var(--navy); }
    .short-desc { color: #3a4252; font-size: 14.5px; line-height: 1.6; margin: 10px 0 0; }
    .building-meta { color: var(--muted); font-size: 14px; margin: 10px 0 14px; display: flex; flex-wrap: wrap; gap: 6px 16px; }

    .pills { display: flex; flex-wrap: wrap; gap: 8px; margin: 2px 0 2px; }
    .bills-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(34, 197, 94, 0.12); color: #15803d;
      font-size: 12.5px; font-weight: 600; padding: 6px 12px; border-radius: 999px;
    }
    .bills-badge::before { content: "✓"; font-weight: 700; }

    /* Rooms */
    .rooms { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; padding: 18px 0 4px; }
    .room { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; background: #fff; }
    .room-photo { height: 170px; width: 100%; object-fit: cover; background: #e9ecf3; cursor: zoom-in; }
    .room-photo-wrap { position: relative; }
    .room-photo-count {
      position: absolute; right: 10px; bottom: 10px;
      background: rgba(0,0,0,0.6); color: #fff; font-size: 11.5px;
      padding: 3px 8px; border-radius: 999px; pointer-events: none;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .room-info { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .room-name { font-weight: 600; font-size: 15px; color: var(--ink); }
    .room-specs { font-size: 13px; color: var(--muted); }
    .price-row { display: flex; align-items: baseline; gap: 6px; }
    .price { font-size: 20px; font-weight: 700; color: var(--navy); }
    .price-unit { font-size: 13px; color: var(--muted); }
    .dates-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 2px; }
    .date-window { font-size: 13.5px; color: var(--ink); background: #f4f6fa; border-radius: 8px; padding: 6px 10px; margin-top: 4px; }
    .date-window .nights { color: var(--muted); font-size: 12px; }
    .room-extras { display: flex; flex-wrap: wrap; gap: 8px; }
    .extra-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: var(--navy);
      background: #eef1f7; border: none; cursor: pointer;
      padding: 5px 10px; border-radius: 8px;
    }
    .extra-link:hover { background: #e3e8f2; }
    .extra-link svg { width: 13px; height: 13px; }
    .terms { font-size: 11.5px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 10px; margin-top: auto; line-height: 1.5; }

    /* Location map */
    .location { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }
    .loc-title { font-size: 15px; font-weight: 700; color: var(--navy); margin: 0 0 12px; }
    .map-link { display: block; position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); line-height: 0; max-width: 600px; }
    .map-img { width: 100%; height: auto; display: block; aspect-ratio: 2 / 1; object-fit: cover; background: #e9ecf3; }
    .map-overlay {
      position: absolute; right: 12px; bottom: 12px;
      background: rgba(255,255,255,0.94); color: var(--navy);
      font-size: 12.5px; font-weight: 600; padding: 7px 11px; border-radius: 999px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: inline-flex; align-items: center; gap: 6px; line-height: 1;
    }
    .map-fallback {
      display: none; align-items: center; justify-content: center; gap: 8px;
      min-height: 150px; background: #eef1f7; color: var(--navy); font-weight: 600; font-size: 14px; line-height: 1.4;
    }
    .location.map-failed .map-img, .location.map-failed .map-overlay { display: none; }
    .location.map-failed .map-fallback { display: flex; }

    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 0 20px 48px; }

    /* ---- Lightbox ---- */
    .lb { position: fixed; inset: 0; background: rgba(8,12,20,0.92); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .lb.open { display: flex; }
    .lb-stage { max-width: 94vw; max-height: 88vh; display: flex; align-items: center; justify-content: center; }
    .lb-stage img, .lb-stage video { max-width: 94vw; max-height: 88vh; object-fit: contain; border-radius: 6px; }
    .lb-stage iframe { width: min(94vw, 1200px); height: min(80vh, 720px); border: 0; border-radius: 6px; background: #000; }
    .lb-close { position: absolute; top: 16px; right: 18px; background: none; border: none; color: #fff; font-size: 34px; line-height: 1; cursor: pointer; opacity: 0.9; }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.16); color: #fff; font-size: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.28); }
    .lb-prev { left: 14px; } .lb-next { right: 14px; }
    .lb-count { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 13px; opacity: 0.85; }
    .lb-caption { position: absolute; bottom: 42px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 13px; opacity: 0.75; max-width: 80vw; text-align: center; }

    @media (max-width: 600px) {
      .rooms { grid-template-columns: 1fr; }
      .car-btn { width: 34px; height: 34px; font-size: 19px; }
      .lb-nav { width: 44px; height: 44px; font-size: 24px; }
      .lb-prev { left: 6px; } .lb-next { right: 6px; }
    }
  </style>
</head>

<body>
  <header class="hero">
    <img class="logo" src="oxford-summer-rooms-logo.svg" alt="Oxford Summer Rooms" />
  </header>

  <main class="listings">
    <div class="listings-head">
      <h2>Available Rooms</h2>
      <div class="as-of" id="asOf"></div>
    </div>
    <div id="status" class="status">Loading available rooms…</div>
    <div id="buildings"></div>
  </main>

  <footer>
    Gas, electricity &amp; water included · Minimum stay 2 weeks · £100 one-off cleaning charge per stay
  </footer>

  <!-- Lightbox -->
  <div class="lb" id="lb" aria-hidden="true">
    <button class="lb-close" data-lb="close" aria-label="Close">×</button>
    <button class="lb-nav lb-prev" data-lb="prev" aria-label="Previous">‹</button>
    <div class="lb-stage" id="lbStage"></div>
    <button class="lb-nav lb-next" data-lb="next" aria-label="Next">›</button>
    <div class="lb-caption" id="lbCaption"></div>
    <div class="lb-count" id="lbCount"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rmoqgbrttdbgxntbxaxr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtb3FnYnJ0dGRiZ3hudGJ4YXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0NzM1NjEsImV4cCI6MjA1MzA0OTU2MX0.Ps1dT9HtOBVzNbiUikzSCWsBhHfg1_2tTevUB7gaL2c';
    const MIN_NIGHTS = 14;
    const MAP_PROXY = `${SUPABASE_URL}/functions/v1/static-map`; // server-side proxy keeps the Google key private

    // If the static map fails (e.g. key not yet configured), show a clean fallback link instead of a broken image.
    function mapError(img) { const loc = img.closest('.location'); if (loc) loc.classList.add('map-failed'); }

    /* SVG icons */
    const ICON_PLAN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M3 9h6V3M21 14h-6v7M9 14H3M15 3v6h6"/></svg>';
    const ICON_PLAY = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    const ICON_360 = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="5"/><path d="M7 12a5 5 0 0 0 10 0"/></svg>';

    async function sb(path) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (!res.ok) throw new Error(`${path} → ${res.status}`);
      return res.json();
    }

    const weeklyRent = (m) => (Number(m) * 12) / 52;
    const fmtGBP = (n) => '£' + Math.round(n).toLocaleString('en-GB');
    const fmtDate = (iso) => new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const nightsBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    /* Split an images jsonb array into photos / floorplans / videos */
    function classifyImages(imgs) {
      const list = Array.isArray(imgs) ? imgs : [];
      const hasTypedFloorplan = list.some(i => (i.type || '').toLowerCase() === 'floorplans');
      const photos = [], floorplans = [], videos = [];
      for (const i of list) {
        const type = (i.type || '').toLowerCase();
        const url = i.imageFile || '';
        const title = i.title || '';
        const looksLikePlan = /plan/i.test(url) || /floor\s*plan/i.test(title);
        if (!url) continue;
        if (type === 'videos') {
          videos.push({ url, title });
        } else if (type === 'floorplans') {
          floorplans.push({ url, title: title || 'Floor plan' });
        } else if (looksLikePlan) {
          // Mislabeled "Photos" floor plan: only keep if no proper Floorplans entry exists,
          // and never let it into the photo carousel.
          if (!hasTypedFloorplan) floorplans.push({ url, title: title || 'Floor plan' });
        } else {
          photos.push({ url, title, sort: i.sortOrder });
        }
      }
      return { photos, floorplans, videos };
    }

    const bySort = (a, b) => (a.sort == null ? 1e9 : a.sort) - (b.sort == null ? 1e9 : b.sort);

    /* Order photos by sortOrder; if a hero override is set for this property_id,
       force it to the front as the main thumbnail (works even with no cached photos). */
    function applyHero(photos, override) {
      const sorted = photos.slice().sort(bySort);
      if (!override || !override.url) return sorted;
      const rest = sorted.filter(p => p.url !== override.url);
      return [{ url: override.url, title: override.title || '' }, ...rest];
    }

    function videoMeta(v) {
      const url = v.url || '';
      const base = url.split('?')[0].toLowerCase();
      const is360 = /360/.test(v.title || '') || /boxbrownie/i.test(url);
      const isFile = /\.(mp4|webm|mov|ogg)$/.test(base);
      const yt = /youtu\.be|youtube\.com/.test(url);
      const vimeo = /vimeo\.com/.test(url);
      return { url, label: is360 ? '360° Tour' : 'Video', isFile, yt, vimeo, embeddable: isFile || yt || vimeo, is360 };
    }

    /* Gallery registry: id -> array of {url,title} */
    const GAL = {};
    let galSeq = 0;
    function registerGallery(items) { const id = 'g' + (++galSeq); GAL[id] = items; return id; }

    /* ---------- Lightbox ---------- */
    const lb = document.getElementById('lb');
    const lbStage = document.getElementById('lbStage');
    const lbCount = document.getElementById('lbCount');
    const lbCaption = document.getElementById('lbCaption');
    let lbItems = [], lbIndex = 0;

    function renderLb() {
      const it = lbItems[lbIndex];
      if (!it) return;
      const multi = lbItems.length > 1;
      lbStage.innerHTML = `<img src="${esc(it.url)}" alt="${esc(it.title || '')}">`;
      lbCount.textContent = multi ? `${lbIndex + 1} / ${lbItems.length}` : '';
      lbCaption.textContent = it.title && !/^image of property$/i.test(it.title) ? it.title : '';
      document.querySelector('.lb-prev').style.display = multi ? '' : 'none';
      document.querySelector('.lb-next').style.display = multi ? '' : 'none';
    }
    function openGallery(items, index) {
      if (!items || !items.length) return;
      lbItems = items; lbIndex = Math.max(0, Math.min(index || 0, items.length - 1));
      renderLb(); lb.classList.add('open'); lb.setAttribute('aria-hidden', 'false');
    }
    function openVideo(meta) {
      if (meta.embeddable) {
        let inner = '';
        if (meta.isFile) inner = `<video src="${esc(meta.url)}" controls autoplay playsinline></video>`;
        else if (meta.yt) {
          const id = (meta.url.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{6,})/) || [])[1];
          inner = `<iframe src="https://www.youtube.com/embed/${esc(id)}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        } else if (meta.vimeo) {
          const id = (meta.url.match(/vimeo\.com\/(\d+)/) || [])[1];
          inner = `<iframe src="https://player.vimeo.com/video/${esc(id)}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        }
        lbItems = []; lbStage.innerHTML = inner; lbCount.textContent = ''; lbCaption.textContent = meta.label;
        document.querySelector('.lb-prev').style.display = 'none';
        document.querySelector('.lb-next').style.display = 'none';
        lb.classList.add('open'); lb.setAttribute('aria-hidden', 'false');
      } else {
        // External tour (e.g. BoxBrownie 360) — open in a new tab.
        window.open(meta.url, '_blank', 'noopener');
      }
    }
    function closeLb() {
      lb.classList.remove('open'); lb.setAttribute('aria-hidden', 'true');
      lbStage.innerHTML = ''; lbItems = [];
    }
    function lbStep(d) { if (lbItems.length) { lbIndex = (lbIndex + d + lbItems.length) % lbItems.length; renderLb(); } }

    document.addEventListener('click', (e) => {
      const lbBtn = e.target.closest('[data-lb]');
      if (lbBtn) {
        const a = lbBtn.dataset.lb;
        if (a === 'close') closeLb(); else if (a === 'prev') lbStep(-1); else if (a === 'next') lbStep(1);
        return;
      }
      if (e.target === lb) { closeLb(); return; }

      const galEl = e.target.closest('[data-gallery]');
      if (galEl) { openGallery(GAL[galEl.dataset.gallery], parseInt(galEl.dataset.index || '0', 10)); return; }

      const vidEl = e.target.closest('[data-video]');
      if (vidEl) { openVideo(JSON.parse(vidEl.dataset.video)); return; }

      const carBtn = e.target.closest('[data-car]');
      if (carBtn) {
        const track = carBtn.closest('.carousel').querySelector('.carousel-track');
        track.scrollBy({ left: (carBtn.dataset.car === 'next' ? 1 : -1) * track.clientWidth, behavior: 'smooth' });
      }
    });
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLb();
      else if (e.key === 'ArrowLeft') lbStep(-1);
      else if (e.key === 'ArrowRight') lbStep(1);
    });
    // Swipe on lightbox
    let tx = 0;
    lb.addEventListener('touchstart', (e) => { tx = e.changedTouches[0].clientX; }, { passive: true });
    lb.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 45) lbStep(dx < 0 ? 1 : -1);
    }, { passive: true });

    /* ---------- Rendering ---------- */
    function extrasChips(floorplans, videos) {
      const bits = [];
      if (floorplans.length) {
        const gid = registerGallery(floorplans);
        bits.push(`<button class="chip" data-gallery="${gid}" data-index="0">${ICON_PLAN} Floor plan</button>`);
      }
      for (const v of videos) {
        const meta = videoMeta(v);
        bits.push(`<button class="chip" data-video='${esc(JSON.stringify(meta))}'>${meta.is360 ? ICON_360 : ICON_PLAY} ${meta.label}</button>`);
      }
      return bits.join('');
    }

    function carousel(photos, floorplans, videos, gapLabel) {
      if (!photos.length) {
        return `<div class="carousel"><div style="height:clamp(210px,40vw,320px);background:#dfe3ec"></div>
          ${gapLabel ? `<span class="gap-badge">${esc(gapLabel)}</span>` : ''}
          <div class="car-extras">${extrasChips(floorplans, videos)}</div></div>`;
      }
      const gid = registerGallery(photos);
      const slides = photos.map((p, i) =>
        `<img class="carousel-slide" src="${esc(p.url)}" alt="${esc(p.title || '')}" loading="lazy" data-gallery="${gid}" data-index="${i}">`
      ).join('');
      const multi = photos.length > 1;
      return `
        <div class="carousel">
          <div class="carousel-track">${slides}</div>
          ${multi ? `<button class="car-btn car-prev" data-car="prev" aria-label="Previous">‹</button>
                     <button class="car-btn car-next" data-car="next" aria-label="Next">›</button>
                     <span class="car-count">1 / ${photos.length}</span>` : ''}
          ${gapLabel ? `<span class="gap-badge">${esc(gapLabel)}</span>` : ''}
          <div class="car-extras">${extrasChips(floorplans, videos)}</div>
        </div>`;
    }

    function roomCard(room, detail, windows, heroOverride) {
      const name = room.room_location || (detail && detail.property_name) || 'Room';
      const cls = classifyImages(detail && detail.images);
      const floorplans = cls.floorplans, videos = cls.videos;
      const photos = applyHero(cls.photos, heroOverride);
      const week = detail ? weeklyRent(detail.rent_per_month) : null;
      const beds = detail ? detail.number_of_beds : null;
      const baths = detail ? detail.number_of_bathrooms : null;

      const specs = [];
      if (beds != null) specs.push(beds + (beds === 1 ? ' bed' : ' beds'));
      if (baths != null) specs.push(baths + (baths === 1 ? ' bath' : ' baths'));

      const bookable = windows
        .filter(w => nightsBetween(w.window_start, w.window_end) >= MIN_NIGHTS)
        .sort((a, b) => a.window_start.localeCompare(b.window_start));
      const datesHtml = bookable.length
        ? bookable.map(w => `<div class="date-window">${fmtDate(w.window_start)} – ${fmtDate(w.window_end)} <span class="nights">· up to ${nightsBetween(w.window_start, w.window_end)} nights</span></div>`).join('')
        : `<div class="date-window" style="color:var(--muted)">No dates of 2+ weeks currently available</div>`;

      const photoGid = photos.length ? registerGallery(photos) : null;
      const photoHtml = photos.length
        ? `<div class="room-photo-wrap">
             <img class="room-photo" src="${esc(photos[0].url)}" alt="${esc(name)}" loading="lazy" data-gallery="${photoGid}" data-index="0">
             ${photos.length > 1 ? `<span class="room-photo-count">📷 ${photos.length}</span>` : ''}
           </div>`
        : `<div class="room-photo"></div>`;

      const extras = [];
      if (floorplans.length) {
        const fgid = registerGallery(floorplans);
        extras.push(`<button class="extra-link" data-gallery="${fgid}" data-index="0">${ICON_PLAN} Floor plan</button>`);
      }
      for (const v of videos) {
        const meta = videoMeta(v);
        extras.push(`<button class="extra-link" data-video='${esc(JSON.stringify(meta))}'>${meta.is360 ? ICON_360 : ICON_PLAY} ${meta.label}</button>`);
      }

      return `
        <article class="room">
          ${photoHtml}
          <div class="room-info">
            <div class="room-name">${esc(name)}</div>
            ${specs.length ? `<div class="room-specs">${specs.join(' · ')}</div>` : ''}
            ${week ? `<div class="price-row"><span class="price">${fmtGBP(week)}</span><span class="price-unit">/ week</span></div>` : ''}
            <div><div class="dates-label">Available</div>${datesHtml}</div>
            ${extras.length ? `<div class="room-extras">${extras.join('')}</div>` : ''}
            <div class="terms">${week ? `${fmtGBP(week)}/week + £100 one-off cleaning. ` : ''}Bills included · Min stay 2 weeks</div>
          </div>
        </article>`;
    }

    function buildingBlock(building, liveRooms, detailById, windowsByRoom, heroById, metaById) {
      const bDetail = detailById.get(building.property_id);
      const bMeta = metaById.get(building.property_id) || {};
      const cls = classifyImages(bDetail && bDetail.images);
      const floorplans = cls.floorplans, videos = cls.videos;
      const photos = applyHero(cls.photos, heroById.get(building.property_id));

      const shortDesc = bMeta.short_description || bMeta.sd || '';
      const usps = [bMeta.usp1, bMeta.usp2, bMeta.usp3].map(u => (u || '').trim()).filter(Boolean);
      const pills = ['Gas, electricity &amp; water included', 'Free Wifi', ...usps.map(esc)]
        .map(label => `<span class="bills-badge">${label}</span>`).join('');

      const weeks = liveRooms.map(r => detailById.get(r.property_id)).filter(Boolean).map(d => weeklyRent(d.rent_per_month));
      const fromWeek = weeks.length ? Math.min(...weeks) : null;
      const gap = (building.preceding_agreement_end && building.start_date)
        ? `Summer gap: ${fmtDate(building.preceding_agreement_end)} – ${fmtDate(building.start_date)}` : '';

      const roomCount = liveRooms.length;
      const roomsHtml = liveRooms.sort((a, b) => a.property_id - b.property_id)
        .map(r => roomCard(r, detailById.get(r.property_id), windowsByRoom.get(r.property_id) || [], heroById.get(r.property_id))).join('');

      const metaBits = [
        building.city || 'Oxford',
        `${roomCount} room${roomCount === 1 ? '' : 's'} available`,
        fromWeek ? `from ${fmtGBP(fromWeek)}/week` : ''
      ].filter(Boolean);

      const address = building.property_address || (bDetail && bDetail.property_name) || 'this property';
      const lat = bMeta.lat, lng = bMeta.lng;
      const locationHtml = (lat && lng) ? `
        <div class="location">
          <h4 class="loc-title">Location</h4>
          <a class="map-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lat + ',' + lng)}" target="_blank" rel="noopener" aria-label="View ${esc(address)} on Google Maps">
            <img class="map-img" src="${MAP_PROXY}?lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lng)}&zoom=15&size=600x300" alt="Map of ${esc(address)}" loading="lazy" onerror="mapError(this)">
            <span class="map-overlay">📍 View on map</span>
            <span class="map-fallback">📍 View on Google Maps</span>
          </a>
        </div>` : '';

      return `
        <section class="building">
          ${carousel(photos, floorplans, videos, gap)}
          <div class="building-body">
            <h3>${esc(building.property_address || (bDetail && bDetail.property_name) || 'Property')}</h3>
            ${shortDesc ? `<p class="short-desc">${esc(shortDesc)}</p>` : ''}
            <div class="building-meta">${metaBits.map(m => `<span>${esc(m)}</span>`).join('')}</div>
            <div class="pills">${pills}</div>
            <div class="rooms">${roomsHtml}</div>
            ${locationHtml}
          </div>
        </section>`;
    }

    /* Keep carousel photo counters in sync while swiping */
    function wireCarousels() {
      document.querySelectorAll('.carousel-track').forEach(track => {
        const count = track.parentElement.querySelector('.car-count');
        if (!count) return;
        let raf = null;
        track.addEventListener('scroll', () => {
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = null;
            const total = track.children.length;
            const idx = Math.round(track.scrollLeft / track.clientWidth) + 1;
            count.textContent = `${Math.min(idx, total)} / ${total}`;
          });
        }, { passive: true });
      });
    }

    async function load() {
      const statusEl = document.getElementById('status');
      try {
        const live = await sb('property_live_status?is_live=eq.true&select=property_id,is_live,hero_image_url,hero_image_sort,hero_image_title');
        const liveIds = new Set(live.map(r => r.property_id));
        // Optional per-property main-thumbnail override (falls back to first Photos image).
        const heroById = new Map(
          live.filter(r => r.hero_image_url)
            .map(r => [r.property_id, { url: r.hero_image_url, title: r.hero_image_title || '', sort: r.hero_image_sort }])
        );
        if (liveIds.size === 0) { statusEl.textContent = 'No rooms are live yet. Please check back soon.'; return; }

        const [buildings, members] = await Promise.all([
          sb('summer_void_properties?select=property_id,property_address,city,rooms,role,preceding_agreement_end,start_date'),
          sb('summer_void_members?select=void_property_id,property_id,room_location')
        ]);

        const liveRoomsByBuilding = new Map();
        for (const m of members) {
          if (!liveIds.has(m.property_id)) continue;
          if (!liveRoomsByBuilding.has(m.void_property_id)) liveRoomsByBuilding.set(m.void_property_id, []);
          liveRoomsByBuilding.get(m.void_property_id).push(m);
        }

        const visibleBuildings = buildings.filter(b => {
          const hasLiveRoom = (liveRoomsByBuilding.get(b.property_id) || []).length > 0;
          const standaloneLive = b.role === 'standalone' && liveIds.has(b.property_id);
          return hasLiveRoom || standaloneLive;
        });
        if (!visibleBuildings.length) { statusEl.textContent = 'No rooms are live yet. Please check back soon.'; return; }

        const liveRoomIds = [...new Set([].concat(...[...liveRoomsByBuilding.values()].map(rs => rs.map(r => r.property_id))))];
        const detailIds = [...new Set([...liveRoomIds, ...visibleBuildings.map(b => b.property_id)])];
        const inList = (ids) => `(${ids.join(',')})`;

        const buildingIds = visibleBuildings.map(b => b.property_id);
        const [detail, availability, buildingMeta, syncLog] = await Promise.all([
          sb(`bannits_property_cache?property_id=in.${inList(detailIds)}&select=property_id,property_name,rent_per_month,number_of_beds,number_of_bathrooms,images`),
          sb(`room_availability?property_id=in.${inList(liveRoomIds)}&select=property_id,window_start,window_end`),
          sb(`bannits_property_cache?property_id=in.${inList(buildingIds)}&select=property_id,short_description,usp1:payload->>usp1,usp2:payload->>usp2,usp3:payload->>usp3,sd:payload->>shortDescription,lat:payload->>latitude,lng:payload->>longitude`),
          sb('summer_voids_sync_log?select=finished_at&order=finished_at.desc&limit=1').catch(() => [])
        ]);

        const detailById = new Map(detail.map(d => [d.property_id, d]));
        const metaById = new Map(buildingMeta.map(m => [m.property_id, m]));
        const windowsByRoom = new Map();
        for (const w of availability) {
          if (!windowsByRoom.has(w.property_id)) windowsByRoom.set(w.property_id, []);
          windowsByRoom.get(w.property_id).push(w);
        }

        document.getElementById('buildings').innerHTML = visibleBuildings
          .sort((a, b) => a.property_id - b.property_id)
          .map(b => buildingBlock(b, liveRoomsByBuilding.get(b.property_id) || [], detailById, windowsByRoom, heroById, metaById))
          .join('');
        statusEl.style.display = 'none';
        wireCarousels();

        if (syncLog && syncLog[0]) {
          document.getElementById('asOf').textContent =
            'Availability as of ' + new Date(syncLog[0].finished_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }
      } catch (err) {
        statusEl.textContent = 'Sorry — we couldn’t load availability right now. Please try again shortly.';
        console.error(err);
      }
    }

    load();
  </script>
